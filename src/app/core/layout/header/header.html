<mat-toolbar class="header" role="banner">
  <span class="header-title" role="heading" aria-level="1">Coffee Workshop</span>

  <nav role="navigation" aria-label="Main navigation">
    <ul class="header-menu" role="menubar">
      <li role="none">
        <a
          [routerLink]="['/products/list']"
          routerLinkActive="router-link-active"
          role="menuitem"
          aria-label="View products"
          >Products</a
        >
      </li>
      @if (isAdmin$ | async) {
        <li role="none">
          <a
            [routerLink]="['/admin']"
            routerLinkActive="router-link-active"
            role="menuitem"
            aria-label="Admin dashboard"
            >Admin</a
          >
        </li>
      }
    </ul>
  </nav>

  <div class="header-actions" role="toolbar" aria-label="User actions">
    <button
      class="shopping-cart-button"
      mat-icon-button
      [attr.aria-label]="'Shopping cart with ' + (cartItemCount$ | async) + ' items'"
      [routerLink]="['/cart']"
      [matBadge]="cartItemCount$ | async"
      [matBadgeHidden]="(cartItemCount$ | async) === 0"
      matBadgeColor="warn"
      tabindex="0"
    >
      <mat-icon aria-hidden="true">shopping_cart</mat-icon>
    </button>

    @if (isAuthenticated$ | async) {
      <button
        mat-icon-button
        [matMenuTriggerFor]="userMenu"
        [attr.aria-label]="'User menu for ' + (user$ | async)?.fullName"
        aria-haspopup="true"
        tabindex="0"
      >
        <mat-icon aria-hidden="true">account_circle</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu" role="menu">
        <div class="user-info" role="presentation">
          <strong aria-label="User name">{{ (user$ | async)?.fullName }}</strong>
          <small aria-label="User email">{{ (user$ | async)?.email }}</small>
        </div>
        <mat-divider role="separator"></mat-divider>
        @if (isAdmin$ | async) {
          <button mat-menu-item [routerLink]="['/admin']" role="menuitem" tabindex="0">
            <mat-icon aria-hidden="true">dashboard</mat-icon>
            <span>Dashboard</span>
          </button>
        }
        <button mat-menu-item (click)="onLogout()" role="menuitem" tabindex="0">
          <mat-icon aria-hidden="true">logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    } @else {
      <button
        mat-button
        [routerLink]="['/auth/login']"
        aria-label="Login to your account"
        tabindex="0"
      >
        <mat-icon aria-hidden="true">login</mat-icon>
        <span>Login</span>
      </button>
    }
  </div>
</mat-toolbar>
