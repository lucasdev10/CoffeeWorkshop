<mat-toolbar class="header">
  <span class="header-title">Coffee Workshop</span>

  <ul class="header-menu">
    <li>
      <a [routerLink]="['/products/list']" routerLinkActive="router-link-active">Produtos</a>
    </li>
    @if (isAdmin()) {
      <li>
        <a [routerLink]="['/admin']" routerLinkActive="router-link-active">Admin</a>
      </li>
    }
  </ul>

  <div class="header-actions">
    <button
      class="shopping-cart-button"
      mat-icon-button
      aria-label="Shopping cart"
      [routerLink]="['/cart']"
      [matBadge]="cartItemCount()"
      [matBadgeHidden]="cartItemCount() === 0"
      matBadgeColor="warn"
    >
      <mat-icon>shopping_cart</mat-icon>
    </button>

    @if (isAuthenticated()) {
      <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="User menu">
        <mat-icon>account_circle</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu">
        <div class="user-info">
          <strong>{{ user()?.name }}</strong>
          <small>{{ user()?.email }}</small>
        </div>
        <mat-divider></mat-divider>
        @if (isAdmin()) {
          <button mat-menu-item [routerLink]="['/admin']">
            <mat-icon>dashboard</mat-icon>
            Dashboard
          </button>
        }
        <button mat-menu-item (click)="onLogout()">
          <mat-icon>logout</mat-icon>
          Sair
        </button>
      </mat-menu>
    } @else {
      <button mat-button [routerLink]="['/auth/login']">
        <mat-icon>login</mat-icon>
        Login
      </button>
    }
  </div>
</mat-toolbar>
