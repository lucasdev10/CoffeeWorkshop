name: Features Deploy

on:
  push:
    branches:
      - feature/*
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  ci:
    name: CI Pipeline
    uses: ./.github/workflows/reusable-ci.yml
    with:
      environment: 'development'
      run-e2e: false
      upload-artifacts: true

  deploy:
    name: Features Deploy
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: development
      url: https://development.coffee-workshop.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-development
          path: dist/

      - name: Deploy to Netlify (Preview)
        uses: nwtgck/actions-netlify@v2
        with:
          publish-dir: './dist/CoffeeWorkshop/browser'
          production-branch: feature/ngrx
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Deploy preview from GitHub Actions'
          enable-pull-request-comment: false
          enable-commit-comment: true
          overwrites-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 10

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Development deployment successful!"
          echo "Development URL: https://development.coffee-workshop.com"
