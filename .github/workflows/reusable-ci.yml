name: Reusable CI

on:
  workflow_call:
    inputs:
      environment:
        required: false
        type: string
        default: 'development'
      run-e2e:
        required: false
        type: boolean
        default: false
      upload-artifacts:
        required: false
        type: boolean
        default: false
    outputs:
      build-success:
        description: 'Build completed successfully'
        value: ${{ jobs.build.outputs.success }}

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

      - name: Run E2E tests
        if: inputs.run-e2e
        run: npx start-server-and-test "npm start" http://localhost:4200 "npm run e2e:headless"

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [lint-and-format, test]
    outputs:
      success: ${{ steps.build.outcome == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        id: build
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            npm run build -- --configuration production
          else
            npm run build
          fi
        env:
          NODE_ENV: ${{ inputs.environment }}

      - name: Upload build artifacts
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ inputs.environment }}
          path: dist/
          retention-days: 7
